<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arbre généalogique</title>
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<svg id="tree"></svg>
<script>

const ROOT_ID = 1;

const people = [
  { id: 1, name: "Jean-Luc GIRAUDEL", dates: "1958", photo: "images/jean-luc.jpg", link: "accueil.html", parent1: 2, parent2: 3 },

  { id: 2, name: "Pierre GIRAUDEL", dates: "06/07/1927-22/02/2022", photo: "pierre-giraudel/photo/pg.webp", link: "pierre-giraudel/biographie.html", parent1: 4, parent2: 5 },
  { id: 3, name: "Janine FÉRÉOL", dates: "14/03/1927-25/12/2021", photo: "janine-fereol/photo/jf.webp", link: "janine-fereol/biographie.html", parent1: 6, parent2: 7 },

  { id: 4, name: "Gaston GIRAUDEL", dates: "26/01/1904-14/10/1973", photo: "gaston-giraudel/photo/gg.webp", link: "gaston-giraudel/biographie.html", parent1: 8, parent2: 9 },
  { id: 5, name: "Geneviève SIMON", dates: "25/01/1904-27/09/1993", photo: "gaston-giraudel/photo/gs.webp", link: "gaston-giraudel/biographie.html", parent1: 10, parent2: 11 },
  { id: 6, name: "Jean FÉRÉOL", dates: "04/04/1891-27/02/1981", photo: "jean-fereol-1891/photo/jf.webp", link: "jean-fereol-1891/biographie.html", parent1: 12, parent2: 13 },
  { id: 7, name: "Emma COSTE", dates: "15/05/1899-12/09/1987", photo: "emma-coste/photo/ec.webp", link: "jean-fereol-1891/biographie.html", parent1: 14, parent2: 15 },

  { id: 8, name: "Gabriel GIRAUDEL", dates: "02/03/1876-22/09/1949", photo: "", link: "joseph-giraudel/biographie.html" },
  { id: 9, name: "Laure CHILLAUD", dates: "28/01/1879-14/02/1958", photo: "joseph-giraudel/photo/lc.webp", link: "joseph-giraudel/biographie.html" },
  { id: 10, name: "Joseph SIMON", dates: "19/03/1858-26/09/1935", photo: "joseph-simon/photo/js.webp", link: "joseph-simon/biographie.html" },
  { id: 11, name: "Jeanne MAZEAU", dates: "09/10/1865-22/10/1953", photo: "joseph-simon/photo/jm.webp", link: "joseph-simon/biographie.html" },
  { id: 12, name: "Jean FÉRÉOL", dates: "21/03/1862-06/06/1927", photo: "jean-fereol/photo/jean-fereol-1862.webp", link: "jean-fereol/biographie.html" },
  { id: 13, name: "Antoinette MURAT", dates: "07/12/1863-17/09/1933", photo: "", link: "jean-fereol/biographie.html" },
  { id: 14, name: "Pierre COSTE", dates: "24/12/1870-29/04/1947", photo: "pierre-coste/photo/pc.webp", link: "pierre-coste/biographie.html" },
  { id: 15, name: "Augustine GUILHEM", dates: "21/07/1876-02/09/1948", photo: "pierre-coste/photo/ag.webp", link: "pierre-coste/biographie.html" },
];

const svg = document.getElementById("tree");

function drawTree() {

  svg.innerHTML = "";

  const width = window.innerWidth;
  const height = window.innerHeight;

  svg.setAttribute("width", width);
  svg.setAttribute("height", height);
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

  const levelWidth = width / 4;
  const boxWidth = width * 0.2;
  const boxHeight = height * 0.08;
  const imageSize = boxHeight * 0.8;

  const positions = {};
  const generations = {};

  function assignGeneration(id, level) {
    if (!generations[level]) generations[level] = [];
    generations[level].push(id);

    const person = people.find(p => p.id === id);
    if (person.parent1) {
      assignGeneration(person.parent1, level + 1);
      assignGeneration(person.parent2, level + 1);
    }
  }

  assignGeneration(ROOT_ID, 0);

  Object.keys(generations).forEach(level => {
    const ids = generations[level];
    const spacing = height / (ids.length + 1);

    ids.forEach((id, i) => {
      positions[id] = {
        x: level * levelWidth + levelWidth * 0.1,
        y: spacing * (i + 1) - boxHeight / 2
      };
    });
  });

  // Lignes
  people.forEach(person => {
    if (person.parent1) {
      [person.parent1, person.parent2].forEach(parentId => {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", positions[person.id].x + boxWidth);
        line.setAttribute("y1", positions[person.id].y + boxHeight / 2);
        line.setAttribute("x2", positions[parentId].x);
        line.setAttribute("y2", positions[parentId].y + boxHeight / 2);
        line.setAttribute("class", "link");
        svg.appendChild(line);
      });
    }
  });

  // Cartes
  people.forEach(person => {

    const link = document.createElementNS("http://www.w3.org/2000/svg", "a");
    link.setAttribute("href", person.link);

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute("class", "card");

    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", positions[person.id].x);
    rect.setAttribute("y", positions[person.id].y);
    rect.setAttribute("width", boxWidth);
    rect.setAttribute("height", boxHeight);
    rect.setAttribute("class", "box");

    const image = document.createElementNS("http://www.w3.org/2000/svg", "image");
    image.setAttribute("href", person.photo);
    image.setAttribute("x", positions[person.id].x + 10);
    image.setAttribute("y", positions[person.id].y + (boxHeight - imageSize)/2);
    image.setAttribute("width", imageSize);
    image.setAttribute("height", imageSize);

    const name = document.createElementNS("http://www.w3.org/2000/svg", "text");
    name.setAttribute("x", positions[person.id].x + boxWidth * 0.25);
    name.setAttribute("y", positions[person.id].y + boxHeight * 0.4);
    name.setAttribute("class", "name");
    name.setAttribute("font-size", boxHeight * 0.22);
    name.textContent = person.name;

    const dates = document.createElementNS("http://www.w3.org/2000/svg", "text");
    dates.setAttribute("x", positions[person.id].x + boxWidth * 0.25);
    dates.setAttribute("y", positions[person.id].y + boxHeight * 0.65);
    dates.setAttribute("class", "dates");
    dates.setAttribute("font-size", boxHeight * 0.18);
    dates.textContent = person.dates;

    group.appendChild(rect);
    group.appendChild(image);
    group.appendChild(name);
    group.appendChild(dates);
    link.appendChild(group);
    svg.appendChild(link);
  });
}

drawTree();
window.addEventListener("resize", drawTree);

</script>

</body>
</html>
